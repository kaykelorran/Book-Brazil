<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book - Catálogo de Livros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Book Brazil</h1>
            <p>Utilize seu catálogo de livros em tempo real</p>
        </header>

        <section class="card">
            <h2 id="form-title">Adicione um novo livro</h2>
            <form id="book-form">
                <input type="hidden" id="book-id">

                <div class="input-group">
                    <label for="title">Título do Livro</label>
                    <input type="text" id="title" placeholder="Ex: Harry Potter" required>
                </div>

                <div class="input-group">
                    <label for="author">Autor</label>
                    <input type="text" id="author" placeholder="Ex: J.K. Rowling" required>

                    <div class="actions">
                        <button type="submit" id="btn-submit" class="btn-primary">Salvar Livros</button>
                        <button type="button" id="btn-cancel" class="btn-secondary"
                            style="display:none">Cancelar</button>

                        <section class="card">
                            <h2>Livros Cadastrados</h2>
                            <div class="table container">
                                <table id="book-table">
                                    <thead>
                                        <tr>
                                            <th>Título</th>
                                            <th>Autor</th>
                                            <th>Açoes</th>
                                        </tr>
                                    </thead>
                                    <tbody id="books-list">
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                    <script src="script.js"></script>

</body>

</html>
